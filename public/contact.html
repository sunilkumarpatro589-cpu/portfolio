<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#4f46e5,#9333ea);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  padding: 25px;
  border-radius: 10px;
  width: 300px;
  text-align: center;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  background: #4f46e5;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div class="container">
  <h2>Contact Form</h2>
  <form>
    <input type="text" placeholder="Name">
    <input type="email" placeholder="Email">
    <button>Submit</button>
  </form>
</div>

</body>
</html>
